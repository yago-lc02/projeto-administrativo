<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ANÁLISE DE JSON NF-E</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajuste do campo de texto para 18 linhas e fonte de código */
        #json-input {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical; /* Permite ajuste manual se o JSON for gigante */
        }
        .text-status-exists { color: #0d6efd; font-weight: bold; }
        .text-status-not-exists { color: #dc3545; font-weight: bold; }
        .label-bold { font-weight: bold; text-transform: uppercase; display: block; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">ANÁLISE DE DADOS EM JSON DE NF-E</h2>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title">Entrada de Dados</h5>
                <p class="text-muted small">Cole o JSON extraído na Etapa 1 abaixo:</p>

                <textarea id="json-input" class="form-control mb-3" rows="38"
                    placeholder='Cole aqui o JSON estruturado...'></textarea>

                <button onclick="analisarDados()" class="btn btn-warning w-100">Analisar Dados da Consulta</button>
            </div>
        </div>

        <hr class="my-5">

        <div id="relatorio" class="d-none">
            <h5 class="mb-3 text-secondary">Resposta da Consulta:</h5>

            <div id="card-resultado" class="card p-4 shadow-sm bg-white border">

                <div class="mb-4">
                    <span class="label-bold">FORNECEDOR:</span>
                    <span id="nome-fornecedor"></span><br>
                    <span id="doc-fornecedor"></span><br>
                    <span id="status-fornecedor"></span>
                </div>

                <div class="mb-4">
                    <span class="label-bold">FATURADO:</span>
                    <span id="nome-faturado"></span><br>
                    <span id="doc-faturado"></span><br>
                    <span id="status-faturado"></span>
                </div>

                <div class="mb-0">
                    <span class="label-bold">DESPESA:</span>
                    <span id="desc-despesa"></span><br>
                    <span id="status-despesa"></span>
                </div>
            </div>

            <div class="mt-4 text-center">
                <button onclick="salvarNF()" class="btn btn-success btn-lg px-5 shadow">Salvar registro</button>
            </div>
        </div>
    </div>

    <script>
        let dadosParaSalvar = null;

        async function analisarDados() {
            const campoTexto = document.getElementById('json-input').value;
            if (!campoTexto) return alert("Por favor, cole o JSON para continuar.");

            try {
                dadosParaSalvar = JSON.parse(campoTexto);
            } catch (e) {
                return alert("Erro: O texto colado não é um JSON válido. Verifique se faltam chaves ou vírgulas.");
            }

            const response = await fetch('http://localhost:8000/api/verificar-nf/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dadosParaSalvar)
            });
            const data = await response.json();

            if (response.ok) {
                exibirRelatorio(data);
            } else {
                alert("Erro no Servidor: " + (data.error || "Erro desconhecido"));
            }
        }

        function exibirRelatorio(data) {
            document.getElementById('relatorio').classList.remove('d-none');

            // Preenchimento com base no novo formato de JSON (Etapa 1)
            document.getElementById('nome-fornecedor').innerText = data.fornecedor.nome;
            document.getElementById('doc-fornecedor').innerText = "CNPJ/CPF: " + dadosParaSalvar.Fornecedor.CNPJ;

            const sForn = document.getElementById('status-fornecedor');
            sForn.innerText = data.fornecedor.status;
            sForn.className = data.fornecedor.status.includes('NÃO') ? "text-status-not-exists" : "text-status-exists";

            document.getElementById('nome-faturado').innerText = data.faturado.nome;
            const docFat = dadosParaSalvar.Faturado.CPF || dadosParaSalvar.Faturado.CNPJ;
            document.getElementById('doc-faturado').innerText = "CNPJ/CPF: " + docFat;

            const sFat = document.getElementById('status-faturado');
            sFat.innerText = data.faturado.status;
            sFat.className = data.faturado.status.includes('NÃO') ? "text-status-not-exists" : "text-status-exists";

            document.getElementById('desc-despesa').innerText = data.despesa.descricao;
            const sDesp = document.getElementById('status-despesa');
            sDesp.innerText = data.despesa.status;
            sDesp.className = data.despesa.status.includes('NÃO') ? "text-status-not-exists" : "text-status-exists";
        }

        async function salvarNF() {
            if (!dadosParaSalvar) return;
            try {
                const response = await fetch('http://localhost:8000/api/salvar-nf/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dadosParaSalvar)
                });
                const data = await response.json();
                alert(response.ok ? "✅ " + data.message : "❌ Erro ao salvar: " + data.message);
            } catch (error) {
                alert("🚨 Falha na comunicação com a API Django.");
            }
        }
    </script>
</body>
</html>
