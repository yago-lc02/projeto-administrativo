{% extends 'financeiro/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0 rounded">
        <div class="card-header bg-success text-white py-3">
            <h5 class="mb-0 fw-bold">Incluir Parceiro Comercial</h5>
        </div>
        
        <div class="card-body p-4">
            <form method="POST" action="{% url 'incluir_pessoa' %}">
                {% csrf_token %}

                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Razão Social / Nome Completo</label>
                        <input type="text" name="nome_razao_social" class="form-control" placeholder="Ex: João da Silva ou Agronegócios LTDA" value="{{ nome_razao_social }}" required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Nome Fantasia <span class="text-muted fw-normal">(Opcional)</span></label>
                        <input type="text" name="fantasia" class="form-control" placeholder="Ex: Agro Sementes" value="{{ fantasia }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">CNPJ / CPF</label>
                        <input type="text" name="cnpj_cpf" id="cnpj_cpf" class="form-control" placeholder="Ex: 00.000.000/0000-00 ou 000.000.000-00" value="{{ cnpj_cpf }}" maxlength="18" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Tipo de Parceiro</label>
                        <select name="tipo" class="form-select" required>
                            <option value="" {% if not tipo %}selected{% endif %} disabled>Selecione o tipo...</option>
                            <option value="FORNECEDOR" {% if tipo == 'FORNECEDOR' %}selected{% endif %}>Fornecedor (Credor)</option>
                            <option value="FATURADO" {% if tipo == 'FATURADO' %}selected{% endif %}>Faturado (Cliente)</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                    <a href="{% url 'listar_pessoas' %}?todos=true" id="btn-cancelar" class="btn btn-light px-4">Cancelar</a>
                    <button type="submit" class="btn btn-success px-4 fw-semibold text-white">Salvar Parceiro</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const referer = document.referrer;
        if (referer && referer.includes('/financeiro/pessoas/')) {
            document.getElementById('btn-cancelar').href = referer;
        }

        const inputCnpjCpf = document.getElementById('cnpj_cpf');
        if (inputCnpjCpf) {
            function aplicarMascara(value) {
                // Remove todos os caracteres não numéricos
                let cleanValue = value.replace(/\D/g, "");
                
                // Limita a 14 dígitos
                if (cleanValue.length > 14) {
                    cleanValue = cleanValue.slice(0, 14);
                }

                if (cleanValue.length <= 11) {
                    // Formata como CPF: 000.000.000-00
                    return cleanValue
                        .replace(/(\d{3})(\d)/, "$1.$2")
                        .replace(/(\d{3})(\d)/, "$1.$2")
                        .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
                } else {
                    // Formata como CNPJ: 00.000.000/0000-00
                    return cleanValue
                        .replace(/^(\d{2})(\d)/, "$1.$2")
                        .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
                        .replace(/\.(\d{3})(\d)/, ".$1/$2")
                        .replace(/(\d{4})(\d{1,2})$/, "$1-$2");
                }
            }

            inputCnpjCpf.addEventListener('input', function(e) {
                e.target.value = aplicarMascara(e.target.value);
            });

            // Formata se já vier carregado
            if (inputCnpjCpf.value) {
                inputCnpjCpf.value = aplicarMascara(inputCnpjCpf.value);
            }
        }
    });
</script>
{% endblock %}
