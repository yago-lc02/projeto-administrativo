{% extends 'financeiro/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0 rounded">
        <div class="card-header bg-warning text-dark d-flex align-items-center justify-content-between py-3">
            <h5 class="mb-0 fw-bold">Alterar Classificação</h5>
            <span class="badge bg-dark text-white">ID: {{ classification.id|default:classificacao.id }}</span>
        </div>
        
        <div class="card-body p-4">
            <form action="{% url 'alterar_classificacao' classificacao.id %}" method="POST">
                {% csrf_token %}
                
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Descrição da Classificação</label>
                        <input type="text" name="descricao" class="form-control" value="{{ classificacao.descricao }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Categoria Geral</label>
                        <input type="text" name="categoria" class="form-control" value="{{ classificacao.categoria|default_if_none:'' }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Tipo de Classificação</label>
                        <select name="tipo" class="form-select" required>
                            <option value="DESPESA" {% if classificacao.tipo == 'DESPESA' %}selected{% endif %}>Despesa (Débito)</option>
                            <option value="RECEITA" {% if classificacao.tipo == 'RECEITA' %}selected{% endif %}>Receita (Crédito)</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                    <a href="{% url 'listar_classificacoes' %}?todos=true" id="btn-cancelar" class="btn btn-light px-4">Cancelar</a>
                    <button type="submit" class="btn btn-warning px-4 fw-semibold text-dark">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const referer = document.referrer;
        if (referer && referer.includes('/financeiro/classificacoes/')) {
            document.getElementById('btn-cancelar').href = referer;
        }
    });
</script>
{% endblock %}
