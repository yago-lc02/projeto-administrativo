<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASHFLOW - Gestão Financeira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/modern/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --verde-principal: #2e7d32;
            /* Verde do seu protótipo */
            --verde-claro: #e8f5e9;
            --cinza-fundo: #f5f5f5;
        }

        body {
            background-color: var(--cinza-fundo);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .banner-cashflow {
            border: 2px solid #333;
            background: white;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(46, 125, 50, 0.1);
        }

        .banner-cashflow h1 {
            color: var(--verde-principal);
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
        }

        .card-custom {
            border: 1px solid #333;
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-title-custom {
            color: var(--verde-principal);
            font-weight: 600;
            border-bottom: 2px dashed var(--verde-claro);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .btn-verde {
            background-color: var(--verde-principal);
            color: white;
            border: 1px solid #222;
        }

        .btn-verde:hover {
            background-color: #1b5e20;
            color: white;
        }

        .table-verde thead {
            background-color: #4caf50;
            color: white;
        }

        .badge-receita {
            background-color: #c8e6c9;
            color: #256029;
            border: 1px solid #256029;
        }

        .badge-despesa {
            background-color: #ffcdd2;
            color: #c62828;
            border: 1px solid #c62828;
        }
    </style>
</head>

<body>

    <div class="container-fluid mt-4">
        <div class="row justify-content-center">

            <div class="col-12 col-md-10 col-lg-8">

                <div class="banner-cashflow">
                    <h1>CASHFLOW</h1>
                </div>

                {% if messages %}
                    <div class="messages mb-3">
                        {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                {% block content %}
                {% endblock %}

            </div>

        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.body.style.visibility = "visible";
        });
    </script>
</body>

</html>
