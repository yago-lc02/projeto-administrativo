<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CASHFLOW</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --verde-principal: #2e7d32;
            --verde-claro: #e8f5e9;
            --cinza-fundo: #f8f9fa;
        }

        body {
            padding-right: 0px !important;
            background-color: var(--cinza-fundo);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            visibility: hidden; /* Evita flash de conteúdo sem estilo */
        }

        #wrapper {
            display: flex;
            width: 100%;
        }

        #sidebar-wrapper {
            width: 280px;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            background-color: #ffffff;
            border-right: 1px solid #dee2e6;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            padding: 30px 20px;
        }

        #sidebar-wrapper .sidebar-title {
            color: var(--verde-principal);
            font-weight: 800;
            letter-spacing: 2px;
            text-align: center;
            padding-bottom: 20px;
            margin-bottom: 30px;
            border-bottom: 2px dashed var(--verde-claro);
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            color: #495057;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
            border: 1px solid transparent;
        }

        .menu-link:hover {
            background-color: var(--verde-claro);
            color: var(--verde-principal);
        }

        .menu-link.active-menu {
            background-color: var(--verde-principal) !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.15);
        }

        #page-content-wrapper {
            margin-left: 280px;
            width: calc(100% - 280px);
            padding: 40px;
            min-height: 100vh;
        }

        .card-custom {
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            min-height: auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .card-title-custom {
            color: var(--verde-principal);
            font-weight: 700;
            border-bottom: 2px dashed var(--verde-claro);
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .btn-verde {
            background-color: var(--verde-principal);
            color: white;
            border: 1px solid #1b5e20;
        }

        .btn-verde:hover {
            background-color: #1b5e20;
            color: white;
        }

        .badge-receita {
            background-color: #c8e6c9;
            color: #256029;
            border: 1px solid #256029;
        }

        .badge-despesa {
            background-color: #ffcdd2;
            color: #c62828;
            border: 1px solid #c62828;
        }

        html {
            overflow-y: scroll;
        }

        @media (max-width: 992px) {
            #wrapper {
                flex-direction: column;
            }
            #sidebar-wrapper {
                width: 100%;
                min-height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #dee2e6;
                padding: 20px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            }
            #sidebar-wrapper .sidebar-title {
                margin-bottom: 15px;
                padding-bottom: 10px;
            }
            .menu-list {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
            }
            .menu-link {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
            #page-content-wrapper {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div id="wrapper">
        <!-- Sidebar Fixo -->
        <div id="sidebar-wrapper">
            <div class="sidebar-title">
                <h4 class="m-0 font-weight-bold">CASHFLOW</h4>
            </div>
            <div class="menu-list">
                <a href="{% url 'listar_lancamentos' %}?todos=true" class="menu-link {% if request.resolver_match.url_name == 'listar_lancamentos' or request.resolver_match.url_name == 'gerar_parcelas' %}active-menu{% endif %}">
                    <span>📊</span> Tela Principal
                </a>
                <a href="{% url 'listar_pessoas' %}" class="menu-link {% if request.resolver_match.url_name == 'listar_pessoas' or request.resolver_match.url_name == 'incluir_pessoa' or request.resolver_match.url_name == 'alterar_pessoa' or request.resolver_match.url_name == 'excluir_pessoa' %}active-menu{% endif %}">
                    <span>👥</span> Parceiros (Pessoas)
                </a>
                <a href="{% url 'listar_classificacoes' %}" class="menu-link {% if request.resolver_match.url_name == 'listar_classificacoes' or request.resolver_match.url_name == 'incluir_classificacao' or request.resolver_match.url_name == 'alterar_classificacao' or request.resolver_match.url_name == 'excluir_classificacao' %}active-menu{% endif %}">
                    <span>🏷️</span> Classificações
                </a>
                <a href="{% url 'interpretar_pdf' %}" class="menu-link {% if request.resolver_match.url_name == 'interpretar_pdf' %}active-menu{% endif %}">
                    <span>📄</span> Extrator de NF
                </a>
                <a href="{% url 'analisador_json_tela' %}" class="menu-link {% if request.resolver_match.url_name == 'analisador_json_tela' %}active-menu{% endif %}">
                    <span>🔍</span> Analisador de JSON
                </a>
                <a href="{% url 'chat_rag' %}" class="menu-link {% if request.resolver_match.url_name == 'chat_rag' %}active-menu{% endif %}">
                    <span>🤖</span> Busca RAG
                </a>
            </div>
        </div>

        <!-- Conteúdo Principal -->
        <div id="page-content-wrapper">
            {% if messages %}
                <div class="messages mb-4">
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.body.style.visibility = "visible";
        });
    </script>
</body>

</html>
