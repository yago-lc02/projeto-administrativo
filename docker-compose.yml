name: projeto_administrativo

services:
  # 1. O contêiner da sua Aplicação Django
  web:
    build: .
    container_name: projeto_final_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - "DATABASE_HOST=projeto_final_db"
    depends_on:
      - db

  # 2. O contêiner do seu Banco de Dados (trazido para cá)
  db:
    image: postgres:15
    container_name: projeto_final_db
    environment:
      POSTGRES_DB: cashflow_db
      POSTGRES_USER: yago_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      # Aponta para o volume físico mapeado no seu gitignore para não perder dados locais
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: